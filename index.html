<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mekarindah</title>
<style>
  * {margin:0; padding:0; box-sizing:border-box;}
  body {
    font-family:'Segoe UI', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    transition:background 1s ease;
    overflow:hidden;
  }
  .player {
    text-align:center;
    padding:40px;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(20px);
    box-shadow:0 0 40px rgba(0,0,0,0.4);
    width:90%;
    max-width:400px;
  }
  .cover-wrap {
    position: relative;
    width: 250px;
    height: 250px;
    margin: 0 auto 25px;
  }
  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 250px;
    height: 250px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: conic-gradient(#ff006e, #8338ec, #3a86ff, #06c, #ff006e);
    animation: spin 3s linear infinite, pulse 2s ease-in-out infinite;
    filter: blur(2px);
    opacity: .8;
  }
  .cover {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 220px;
    height: 220px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
    animation: rotate 10s linear infinite;
  }
  @keyframes spin {
    from {transform:translate(-50%,-50%) rotate(0deg);}
    to {transform:translate(-50%,-50%) rotate(360deg);}
  }
  @keyframes pulse {
    0%,100% {opacity:.8; transform:translate(-50%,-50%) scale(1);}
    50% {opacity:1; transform:translate(-50%,-50%) scale(1.05);}
  }
  @keyframes rotate {
    from {transform:translate(-50%,-50%) rotate(0deg);}
    to {transform:translate(-50%,-50%) rotate(360deg);}
  }
  .paused {animation-play-state:paused;}
  
  /* CONTAINER UNTUK JUDUL LAGU */
  .title-container {
    width: 100%;
    overflow: hidden;
    position: relative;
    margin-bottom: 5px;
    min-height: 30px;
    display: flex;
    justify-content: center;
  }
  
  #title {
    color:#fff;
    white-space: nowrap;
    display: inline-block;
    font-size: 1.5rem;
    transition: all 0.3s ease;
    text-align: center;
  }
  
  /* Mode berjalan untuk judul panjang */
  #title.marquee {
    animation: marquee 15s linear infinite;
    animation-delay: 1s;
    padding-right: 50px;
  }
  
  @keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }
  
  /* Mode diam untuk judul pendek */
  #title.static {
    transform: none !important;
    animation: none;
    width: auto;
    max-width: 100%;
    text-overflow: ellipsis;
    overflow: hidden;
  }
  
  h4 {color:#ddd; margin-bottom:10px;}

  .radio-name {
    color:#000;
    font-weight:bold;
    margin-bottom:20px;
    text-shadow:1px 1px 4px rgba(255,255,255,0.7);
    letter-spacing:0.5px;
  }

  .controls {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin:15px 0;
  }
  button {
    background:rgba(255,255,255,0.2);
    color:white;
    border:none;
    border-radius:50%;
    width:60px; height:60px;
    cursor:pointer;
    font-size:22px;
    transition:.3s;
    box-shadow:0 0 10px rgba(255,255,255,0.2);
  }
  button:hover {
    background:rgba(255,255,255,0.3);
    transform:scale(1.1);
    box-shadow:0 0 20px rgba(255,255,255,0.5);
  }

  .listeners {
    color:#fff;
    margin-top:10px;
    font-size:14px;
    opacity:.8;
  }
  
  @media (max-width: 480px) {
    .cover-wrap {
      width: 200px;
      height: 200px;
    }
    .ring {
      width: 200px;
      height: 200px;
    }
    .cover {
      width: 180px;
      height: 180px;
    }
    .title-container {
      min-height: 25px;
    }
    #title {
      font-size: 1.3rem;
    }
  }
</style>
</head>
<body>
<div class="player">
  <div class="cover-wrap">
    <div class="ring"></div>
    <img id="cover" class="cover" src="https://mekarindah.netlify.app/img/default.jpg" />
  </div>
  
  <div class="title-container">
    <h2 id="title">MEKARINDAH</h2>
  </div>
  
  <h4 id="artist">Streaming Live</h4>
  <div class="radio-name">LIVE • Mekarindah</div>

  <div class="controls">
    <button id="refresh" title="Refresh">🔄</button>
    <button id="play" title="Play / Pause">▶</button>
    <button id="stop" title="Stop">⏹</button>
  </div>

  <div class="listeners" id="listeners">Menunggu data...</div>
</div>

<!-- ELEMEN TERSEMBUNYI UNTUK FastCast4u STREAMINFO -->
<div style="display:none;">
  <span class="cc_streaminfo" data-type="song" data-username="kiarafm">Loading ...</span>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<!-- SCRIPT STREAMINFO.JS DARI FASTCAST4U -->
<script src="https://eu1.fastcast4u.com/system/streaminfo.js"></script>

<script>
// ========== KONFIGURASI ==========
const CONFIG = {
  streamUrl: "https://eu1.fastcast4u.com/proxy/kiarafm/stream",   // Stream FastCast4u
  defaultCover: "https://mekarindah.netlify.app/img/default.jpg"
};

// ========== DATABASE QARI/ARTIS (RECITER COVERS) ==========
const qariDatabase = {
    'mishary': 'https://i.ytimg.com/vi/GLMp_EGGLfk/hq720.jpg?sqp=-oaymwExCK4FEIIDSFryq4qpAyMIARUAAIhCGAHwAQH4AdQGgALgA4oCDAgAEAEYciBWKDgwDw==&rs=AOn4CLAa_DZgLB8D4xcMTFPgxpnQghg_sw',
    'abdul': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT99qAcwhSDEUMmxHHzjEfna9YVgtg-04A8rDvXbaNtZf-70ZkRxPPl_i5J_he-DnfdtO7EhS0ouUaiu-hq_bE8Ni9U3xKBjsAdFgzAg4w&s=10',
    'adi hidayat': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQi7cw0cL0cs4aqyXA5sbBMBaCWGmW0D28pzruJKEWXlx9RYeQLuZouy9VlqLk9oWvOxlO7jHAh6QOXhjPyKPQZqz2rez4YV5XOPrgTTQ&s=10',
    'zainuddin': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDo4WarU6dxMHRx3BFqisexu4euGqv9Ni9_JZA5jZBwA&s=10',
    'latif': 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQSgeut2z_VzZzl5_B7sbcdxL2FkG3Rd3dOTaS3WCOXEA&s=10',
    'al sudais': 'https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Abdulrahman_Al-Sudais.jpg/440px-Abdulrahman_Al-Sudais.jpg',
    'ghamdi': 'https://i.ibb.co/Wp0y1hG/ghamdi.jpg',
    'lili rahmah': 'https://cdn-images.dzcdn.net/images/cover/b2fb0265b6c2182f983df15c6d7e4b87/1900x1900-000000-80-0-0.jpg',
    'shatri': 'https://i.ibb.co/fQ5N204/shatri.jpg',
    'abdul basit': 'https://i.ibb.co/RzM805h/abdulbasit.jpg',
};

// ========== WARNA BACKGROUND ==========
const colors = [
  'linear-gradient(135deg,#667eea,#764ba2)',
  'linear-gradient(135deg,#f093fb,#f5576c)',
  'linear-gradient(135deg,#4facfe,#00f2fe)',
  'linear-gradient(135deg,#fa709a,#fee140)',
  'linear-gradient(135deg,#30cfd0,#330867)',
  'linear-gradient(135deg,#ff6ec4,#7873f5)',
  'linear-gradient(135deg,#43e97b,#38f9d7)',
  'linear-gradient(135deg,#ff9a9e,#fad0c4)'
];
let colorIndex = 0;

// ========== DOM ELEMENTS ==========
const audio = document.getElementById("audio");
const playBtn = document.getElementById("play");
const stopBtn = document.getElementById("stop");
const refreshBtn = document.getElementById("refresh");
const cover = document.getElementById("cover");
const titleEl = document.getElementById("title");
const artistEl = document.getElementById("artist");
const listenersDiv = document.getElementById("listeners");

let isPlaying = false;
let lastTrack = "";

// ========== FUNGSI UNTUK MENGATUR MODE JUDUL (BERJALAN/STATIS) ==========
function updateTitleMode() {
    const titleContainer = document.querySelector('.title-container');
    const titleWidth = titleEl.scrollWidth;
    const containerWidth = titleContainer.offsetWidth;
    
    titleEl.classList.remove('marquee', 'static');
    
    if (titleWidth > containerWidth) {
        titleEl.classList.add('marquee');
        console.log('Judul panjang, aktifkan mode berjalan');
    } else {
        titleEl.classList.add('static');
        console.log('Judul pendek, mode statis (center)');
    }
}

// ========== FUNGSI GANTI BACKGROUND OTOMATIS ==========
function cycleBackground() {
    colorIndex = (colorIndex + 1) % colors.length;
    document.body.style.background = colors[colorIndex];
}

function changeBackgroundColor(seed) {
    const hash = seed.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
    const idx = Math.abs(hash) % colors.length;
    document.body.style.background = colors[idx];
    colorIndex = idx;
}

// ========== FUNGSI MENCARI COVER DARI DATABASE QARI ==========
function getQariCover(name) {
    const lowerName = name.toLowerCase().trim();
    for (const key in qariDatabase) {
        if (lowerName.includes(key)) {
            return qariDatabase[key];
        }
    }
    return null;
}

// ========== MENGUPDATE TAMPILAN DENGAN METADATA ==========
async function updateNowPlaying(titleRaw, artistRaw) {
  let title = titleRaw?.trim() || "Mekarindah";
  let artist = artistRaw?.trim() || "Streaming Live";
  
  // Jika title masih mengandung " - " dan artist kosong, pecah
  if (title.includes(" - ") && (!artistRaw || artistRaw === "")) {
    const parts = title.split(" - ");
    artist = parts[0].trim();
    title = parts.slice(1).join(" - ").trim();
  }
  
  // Cek cover dari database qari
  let qariCover = getQariCover(artist) || getQariCover(title);
  let img = null;
  
  if (qariCover) {
    img = qariCover;
    // Jika artist masih generic, ganti dengan nama qari yang terdeteksi
    if (artist === "Streaming Live" || artist === "Mekarindah") {
      let keyFound = Object.keys(qariDatabase).find(key => title.toLowerCase().includes(key));
      if (keyFound) {
        artist = keyFound.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        title = title.replace(new RegExp(keyFound, 'gi'), '').trim();
        if (title === "" || title.length < 3) title = "Murottal";
      }
    }
  }
  
  // Jika belum dapat cover, coba fallback ke iTunes (optional, tapi tetap pakai default jika gagal)
  if (!img) {
    try {
      const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(artist + " " + title)}&limit=1`, { cache: "no-store" });
      const j = await res.json();
      if (j.results?.length > 0) {
        img = j.results[0].artworkUrl100.replace("100x100", "600x600");
      }
    } catch (e) { console.warn("iTunes fallback gagal"); }
  }
  
  // Update elemen DOM
  titleEl.textContent = title;
  artistEl.textContent = artist;
  listenersDiv.textContent = "🎵 Live dari Mekarindah";
  cover.src = img || CONFIG.defaultCover;
  
  setTimeout(updateTitleMode, 10);
  changeBackgroundColor(title + artist);
}

// ========== MEMBACA METADATA DARI ELEMEN cc_streaminfo ==========
let lastProcessed = "";
function getStreamInfoFromElement() {
  const elem = document.querySelector('.cc_streaminfo');
  if (!elem) return;
  const raw = elem.textContent || elem.innerText;
  if (!raw || raw === "Loading ..." || raw === "Loading..." || raw === lastProcessed) return;
  lastProcessed = raw;
  
  let artist = "";
  let title = raw;
  if (raw.includes(" - ")) {
    const parts = raw.split(" - ");
    artist = parts[0].trim();
    title = parts.slice(1).join(" - ").trim();
  }
  updateNowPlaying(title, artist);
}

// ========== MEMASANG OBSERVER UNTUK PERUBAHAN PADA cc_streaminfo ==========
function setupStreamInfoObserver() {
  const target = document.querySelector('.cc_streaminfo');
  if (!target) return;
  const observer = new MutationObserver(() => {
    getStreamInfoFromElement();
  });
  observer.observe(target, { childList: true, characterData: true, subtree: true });
  getStreamInfoFromElement(); // baca pertama kali
}

// ========== KONTROL PLAYER ==========
audio.src = CONFIG.streamUrl;
audio.volume = 0.7;

playBtn.onclick = () => {
  if (isPlaying) {
    audio.pause();
    cover.classList.add("paused");
    playBtn.textContent = "▶";
  } else {
    audio.play();
    cover.classList.remove("paused");
    playBtn.textContent = "⏸";
  }
  isPlaying = !isPlaying;
};

stopBtn.onclick = () => {
  audio.pause();
  audio.currentTime = 0;
  isPlaying = false;
  cover.classList.add("paused");
  playBtn.textContent = "▶";
};

refreshBtn.onclick = () => {
  getStreamInfoFromElement();
  if (!isPlaying) {
    audio.play().catch(e=>console.warn);
    isPlaying = true;
    cover.classList.remove("paused");
    playBtn.textContent = "⏸";
  }
};

// ========== RESIZE EVENT ==========
window.addEventListener('resize', updateTitleMode);

// ========== INISIALISASI ==========
setupStreamInfoObserver();
setInterval(getStreamInfoFromElement, 8000);  // fallback tiap 8 detik
setInterval(cycleBackground, 20000);          // cycle background tiap 20 detik
setTimeout(updateTitleMode, 100);
setTimeout(cycleBackground, 500);
</script>
</body>
  </html>
